<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرض التبيان</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
            font-family: Arial, sans-serif !important;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h2 { 
            font-size: 35px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #c5a059;
            display: inline-block;
            padding-bottom: 10px;
            margin-top: 50px;
        }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border: 3px solid #ffffff;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
            transition: all 0.5s ease-in-out;
            opacity: 0.9; 
        }
        .gallery-item img:hover {
            transform: scale(1.05); 
            opacity: 1;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.9);
            border-color: #c5a059; 
        }
    </style>
</head>
<body>

    <section>
        <h2>معرض تبيان</h2>
